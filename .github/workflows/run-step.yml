name: Run Step

on:
  workflow_dispatch:
    inputs:
      step_id:
        description: "Step ID (e.g. STEP_01)"
        required: true
        default: "STEP_01"
      project_ids:
        description: "Comma-separated project IDs (e.g. PJT-001,PJT-002)"
        required: true
        default: "PJT-001"
      max_items:
        description: "Max number of items to process"
        required: false
        default: "1"
      dry_run:
        description: "Set to 'true' to skip all Sheets writes (dry run mode)"
        required: false
        default: "false"

jobs:
  run-step:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run step
        run: node dist/index.js
        env:
          STEP_ID: ${{ inputs.step_id }}
          PROJECT_IDS: ${{ inputs.project_ids }}
          MAX_ITEMS: ${{ inputs.max_items }}
          DRY_RUN: ${{ inputs.dry_run }}
          SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
