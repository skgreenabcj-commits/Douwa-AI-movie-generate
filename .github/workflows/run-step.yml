name: Run Step

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Project ID"
        required: true
      step_id:
        description: "Step ID"
        required: true
      spreadsheet_id:
        description: "Spreadsheet ID"
        required: false

jobs:
  run-step:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run step
        run: node dist/index.js
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          STEP_ID: ${{ inputs.step_id }}
          SPREADSHEET_ID: ${{ inputs.spreadsheet_id }}
